<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home</title>
  <link rel="stylesheet" href="../assets/ui-common.css?v=20260326-03" />
  <link rel="stylesheet" href="../assets/app.css?v=20260326-03" />
  <link rel="stylesheet" href="home.css?v=20260326-07" />
</head>
<body class="home">
  <main class="home-layout" role="main">
    <section class="panel spindle-panel" aria-labelledby="spindleTitle">
      <header class="panel-header">
        <h2 id="spindleTitle">Spindel</h2>
        <span class="panel-sub" aria-live="polite">live</span>
      </header>

      <div class="spindle-stack">
        <article class="gauge-card" aria-labelledby="spindleLoadGaugeTitle">
          <div class="gauge-card__head">
            <h3 id="spindleLoadGaugeTitle">Spindellast</h3>
          </div>

          <div class="arc-gauge" id="spindleGauge" style="--gauge-color:#1a1a1a">
            <div class="arc-gauge__wrap">
              <svg class="arc-gauge__svg" viewBox="0 0 360 180" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                <path class="arc-gauge__bg"></path>
                <path class="arc-gauge__fill"></path>
              </svg>
              <div class="arc-gauge__value" id="spindleValue">68%</div>
            </div>
            <div class="arc-gauge__markers" aria-hidden="true">
              <span>0%</span>
              <span>100%</span>
            </div>
          </div>
        </article>

        <article class="gauge-card" aria-labelledby="spindleTempGaugeTitle">
          <div class="gauge-card__head">
            <h3 id="spindleTempGaugeTitle">Spindeltemperatur</h3>
          </div>

          <div class="arc-gauge arc-gauge--temperature" id="spindleTempGauge" style="--gauge-color:#b66100" data-state="loading">
            <div class="arc-gauge__wrap">
              <svg class="arc-gauge__svg" viewBox="0 0 360 180" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                <path class="arc-gauge__bg"></path>
                <path class="arc-gauge__fill"></path>
              </svg>
              <div class="arc-gauge__value" id="spindleTempValue">--.-&deg;C</div>
            </div>
            <div class="arc-gauge__markers" aria-hidden="true">
              <span>20&deg;C</span>
              <span>55&deg;C</span>
            </div>
          </div>
        </article>
      </div>
    </section>

    <section class="panel axes-panel" aria-labelledby="axesTitle">
      <header class="panel-header">
        <h2 id="axesTitle">Achsenlasten</h2>
        <span class="panel-sub">Diagramm</span>
      </header>

      <div class="axes-chart" role="img" aria-label="Achsenlasten Zeitverlauf">
        <div class="chart-grid" aria-hidden="true"></div>
        <div class="axis-labels" aria-hidden="true">
          <div class="axis-label-y axis-label-y--top">100%</div>
          <div class="axis-label-y axis-label-y--mid">50%</div>
          <div class="axis-label-x axis-label-x--left" id="axisLabelLeft">60s</div>
          <div class="axis-label-x axis-label-x--mid" id="axisLabelMid">30s</div>
          <div class="axis-label-x axis-label-x--right" id="axisLabelRight">0s</div>
        </div>
        <svg class="axes-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <polyline class="axis-line" id="line-spindle" data-axis="spindle"></polyline>
          <polyline class="axis-line" id="line-x" data-axis="x"></polyline>
          <polyline class="axis-line" id="line-y" data-axis="y"></polyline>
          <polyline class="axis-line" id="line-z" data-axis="z"></polyline>
        </svg>
      </div>

      <div class="axes-field" aria-label="Achsenlasten Legende">
        <div class="axes-grid">
          <div class="axis-card" data-axis="spindle" role="button" tabindex="0" aria-pressed="true">
            <span class="axis-dot" aria-hidden="true"></span>
            <div class="axis-info">
              <div class="axis-name">Spindel</div>
              <div class="axis-value" id="axis-value-spindle">68%</div>
            </div>
          </div>
          <div class="axis-card" data-axis="x" role="button" tabindex="0" aria-pressed="true">
            <span class="axis-dot" aria-hidden="true"></span>
            <div class="axis-info">
              <div class="axis-name">X Achse</div>
              <div class="axis-value" id="axis-value-x">42%</div>
            </div>
          </div>
          <div class="axis-card" data-axis="y" role="button" tabindex="0" aria-pressed="true">
            <span class="axis-dot" aria-hidden="true"></span>
            <div class="axis-info">
              <div class="axis-name">Y Achse</div>
              <div class="axis-value" id="axis-value-y">55%</div>
            </div>
          </div>
          <div class="axis-card" data-axis="z" role="button" tabindex="0" aria-pressed="true">
            <span class="axis-dot" aria-hidden="true"></span>
            <div class="axis-info">
              <div class="axis-name">Z Achse</div>
              <div class="axis-value" id="axis-value-z">33%</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "http://localhost:8080";
    const axisKeys = ["spindle", "x", "y", "z"];
    const SPINDLE_TEMP_MIN_C = 20;
    const SPINDLE_TEMP_MAX_C = 55;
    const SPINDLE_TEMP_REFRESH_MS = 2500;
    const axisState = {};

    const spindleValueEl = document.getElementById("spindleValue");
    const spindleGauge = document.getElementById("spindleGauge");
    const spindleGaugeFill = spindleGauge.querySelector(".arc-gauge__fill");
    const spindleTempGauge = document.getElementById("spindleTempGauge");
    const spindleTempGaugeFill = spindleTempGauge.querySelector(".arc-gauge__fill");
    const spindleTempValueEl = document.getElementById("spindleTempValue");

    const axisValueEls = {
      spindle: document.getElementById("axis-value-spindle"),
      x: document.getElementById("axis-value-x"),
      y: document.getElementById("axis-value-y"),
      z: document.getElementById("axis-value-z")
    };

    const lineEls = {
      spindle: document.getElementById("line-spindle"),
      x: document.getElementById("line-x"),
      y: document.getElementById("line-y"),
      z: document.getElementById("line-z")
    };

    const cardEls = {
      spindle: document.querySelector('.axis-card[data-axis="spindle"]'),
      x: document.querySelector('.axis-card[data-axis="x"]'),
      y: document.querySelector('.axis-card[data-axis="y"]'),
      z: document.querySelector('.axis-card[data-axis="z"]')
    };

    const axisValues = { spindle: 0, x: 0, y: 0, z: 0 };
    const axisAvailability = { spindle: true, x: false, y: false, z: false };
    const history = {
      spindle: [],
      x: [],
      y: [],
      z: []
    };
    let spindleDisplayValue = 0;
    const SPINDLE_SMOOTH = 0.12;
    let spindleTempTargetC = SPINDLE_TEMP_MIN_C;
    let spindleTempDisplayC = SPINDLE_TEMP_MIN_C;
    let spindleTempAvailable = false;
    const SPINDLE_TEMP_SMOOTH = 0.15;
    let HISTORY_WINDOW_MS = 60000;
    const HISTORY_INTERVAL_MS = 120;
    let lastHistoryTs = 0;
    let graphPressTimer = null;
    let settingsSaveTimer = null;
    let axisSaveTimer = null;
    const axisSuppressClickUntilMs = {};
    const axisLabelLeft = document.getElementById("axisLabelLeft");
    const axisLabelMid = document.getElementById("axisLabelMid");
    const axisLabelRight = document.getElementById("axisLabelRight");
    const axesChart = document.querySelector(".axes-chart");

    const GAUGE_CX = 180;
    const GAUGE_CY = 180;
    const GAUGE_R = 140;
    const GAUGE_STROKE_W = 52;
    const GAUGE_TOTAL_LEN = Math.PI * GAUGE_R;

    function describeArc(start, end){
      const x1 = GAUGE_CX + GAUGE_R * Math.cos(start);
      const y1 = GAUGE_CY + GAUGE_R * Math.sin(start);
      const x2 = GAUGE_CX + GAUGE_R * Math.cos(end);
      const y2 = GAUGE_CY + GAUGE_R * Math.sin(end);
      const sweep = end - start > Math.PI ? 1 : 0;
      return `M ${x1} ${y1} A ${GAUGE_R} ${GAUGE_R} 0 ${sweep} 1 ${x2} ${y2}`;
    }

    function setupGaugePaths(gaugeEl){
      if (!gaugeEl) return;
      const bgPath = gaugeEl.querySelector(".arc-gauge__bg");
      const fillPath = gaugeEl.querySelector(".arc-gauge__fill");
      if (!bgPath || !fillPath) return;

      const arcPath = describeArc(Math.PI, 2 * Math.PI);
      bgPath.setAttribute("d", arcPath);
      bgPath.setAttribute("stroke-width", String(GAUGE_STROKE_W));
      fillPath.setAttribute("d", arcPath);
      fillPath.setAttribute("stroke-width", String(GAUGE_STROKE_W));
      fillPath.style.strokeDasharray = GAUGE_TOTAL_LEN.toFixed(2);
      fillPath.style.strokeDashoffset = GAUGE_TOTAL_LEN.toFixed(2);
    }

    function clampPercent(value){
      const v = Number(value);
      if (Number.isNaN(v)) return 0;
      return Math.max(0, Math.min(100, Math.round(v)));
    }

    function clampSpindleTemperature(value){
      const v = Number(value);
      if (!Number.isFinite(v)) return SPINDLE_TEMP_MIN_C;
      return Math.max(SPINDLE_TEMP_MIN_C, Math.min(SPINDLE_TEMP_MAX_C, v));
    }

    function temperatureToProgress(value){
      const clamped = clampSpindleTemperature(value);
      return ((clamped - SPINDLE_TEMP_MIN_C) / (SPINDLE_TEMP_MAX_C - SPINDLE_TEMP_MIN_C)) * 100;
    }

    function setGaugeProgress(fillEl, value){
      if (!fillEl) return;
      const progress = Math.max(0, Math.min(100, Number(value) || 0));
      fillEl.style.strokeDashoffset = (GAUGE_TOTAL_LEN * (1 - progress / 100)).toFixed(2);
    }

    function setSpindleValue(value){
      const v = clampPercent(value);
      spindleValueEl.textContent = `${v}%`;
      setGaugeProgress(spindleGaugeFill, v);
    }

    function setSpindleTemperatureValue(value){
      const clamped = clampSpindleTemperature(value);
      const progress = temperatureToProgress(clamped);
      spindleTempValueEl.textContent = `${clamped.toLocaleString("de-DE", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
      })}\u00B0C`;
      setGaugeProgress(spindleTempGaugeFill, progress);
    }

    function temperatureColorFor(value){
      const temp = clampSpindleTemperature(value);
      const ratio = (temp - SPINDLE_TEMP_MIN_C) / (SPINDLE_TEMP_MAX_C - SPINDLE_TEMP_MIN_C);
      if (ratio >= 0.85) return "#8c1d18";
      if (ratio >= 0.6) return "#c56a00";
      if (ratio >= 0.35) return "#5f7f14";
      return "#0d5b8a";
    }

    function applySpindleTemperaturePayload(payload){
      const available = !!(payload && payload.available);
      const temperature = Number(payload && payload.temperatureC);

      spindleTempAvailable = available && Number.isFinite(temperature);
      spindleTempGauge.dataset.state = spindleTempAvailable ? "ok" : "error";

      if (!spindleTempAvailable){
        spindleTempValueEl.textContent = "--.-\u00B0C";
        setGaugeProgress(spindleTempGaugeFill, 0);
        spindleTempGauge.style.setProperty("--gauge-color", "#9b9b9b");
        spindleTempDisplayC = SPINDLE_TEMP_MIN_C;
        spindleTempTargetC = SPINDLE_TEMP_MIN_C;
        return;
      }

      spindleTempTargetC = clampSpindleTemperature(temperature);
      spindleTempGauge.style.setProperty("--gauge-color", temperatureColorFor(spindleTempTargetC));
    }

    function loadSpindleTemperature(){
      fetch(`${API_BASE}/api/hardware/spindle-temperature?refresh=1`)
        .then((res) => res.ok ? res.json() : null)
        .then((data) => {
          applySpindleTemperaturePayload(data);
        })
        .catch(() => {
          applySpindleTemperaturePayload(null);
        });
    }

    function setAxisValue(axis, value){
      const v = clampPercent(value);
      axisValues[axis] = v;
      if (axisValueEls[axis]){
        if (axis === "spindle" || axisAvailability[axis]){
          axisValueEls[axis].textContent = `${v}%`;
        } else {
          axisValueEls[axis].textContent = "--";
        }
      }
      if (axis === "spindle") setSpindleValue(v);
    }

    function renderChart(now){
      axisKeys.forEach((axis) => {
        const line = lineEls[axis];
        if (!line) return;
        if (axis !== "spindle" && !axisAvailability[axis]){
          line.setAttribute("points", "");
          return;
        }
        const data = history[axis];
        if (!data.length){
          line.setAttribute("points", "");
          return;
        }
        const windowStart = now - HISTORY_WINDOW_MS;
        const points = data
          .filter((p) => p.t >= windowStart)
          .map((p) => {
            const x = ((p.t - windowStart) / HISTORY_WINDOW_MS) * 100;
            const y = 100 - (p.v / 100) * 100;
            return `${x.toFixed(2)},${y.toFixed(2)}`;
          });
        line.setAttribute("points", points.join(" "));
      });
    }

    function updateAxisLabels(windowMs){
      const seconds = Math.round(windowMs / 1000);
      const mid = Math.round(seconds / 2);
      axisLabelLeft.textContent = `${seconds}s`;
      axisLabelMid.textContent = `${mid}s`;
      axisLabelRight.textContent = "0s";
    }

    function updateGraphWindow(seconds, persist = false){
      const s = Math.max(10, Math.min(120, Number(seconds) || 60));
      HISTORY_WINDOW_MS = s * 1000;
      updateAxisLabels(HISTORY_WINDOW_MS);
      if (persist){
        scheduleSettingsSave(s);
      }
    }

    function scheduleSettingsSave(seconds){
      if (settingsSaveTimer) clearTimeout(settingsSaveTimer);
      settingsSaveTimer = setTimeout(() => {
        fetch(`${API_BASE}/api/settings`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ graphWindowSec: seconds })
        }).catch(() => {});
      }, 300);
    }

    function loadSettings(){
      fetch(`${API_BASE}/api/settings`)
        .then((res) => res.ok ? res.json() : null)
        .then((data) => {
          if (!data || typeof data !== "object") return;
          if (typeof data.graphWindowSec === "number"){
            updateGraphWindow(data.graphWindowSec, false);
          }
          if (data.axisVisibility && typeof data.axisVisibility === "object"){
            axisKeys.forEach((axis) => {
              if (data.axisVisibility[axis] !== undefined){
                setAxisEnabled(axis, !!data.axisVisibility[axis], false);
              }
            });
          }
        })
        .catch(() => {});
    }

    function scheduleAxisVisibilitySave(){
      if (axisSaveTimer) clearTimeout(axisSaveTimer);
      axisSaveTimer = setTimeout(() => {
        fetch(`${API_BASE}/api/settings`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            axisVisibility: axisState
          })
        }).catch(() => {});
      }, 300);
    }

    function pushHistory(now){
      axisKeys.forEach((axis) => {
        const data = history[axis];
        data.push({ t: now, v: axisValues[axis] });
        while (data.length && data[0].t < now - HISTORY_WINDOW_MS - 1000){
          data.shift();
        }
      });
      renderChart(now);
    }

    function tick(now){
      const spindleTarget = axisValues.spindle;
      spindleDisplayValue += (spindleTarget - spindleDisplayValue) * SPINDLE_SMOOTH;
      setSpindleValue(spindleDisplayValue);

      if (spindleTempAvailable){
        spindleTempDisplayC += (spindleTempTargetC - spindleTempDisplayC) * SPINDLE_TEMP_SMOOTH;
        setSpindleTemperatureValue(spindleTempDisplayC);
      }

      if (!lastHistoryTs) lastHistoryTs = now;
      if (now - lastHistoryTs >= HISTORY_INTERVAL_MS){
        pushHistory(now);
        lastHistoryTs = now;
      }

      renderChart(now);
      requestAnimationFrame(tick);
    }

    function clearGraphPress(){
      if (graphPressTimer) clearTimeout(graphPressTimer);
      graphPressTimer = null;
    }

    function setAxisEnabled(axis, enabled, persist = true){
      const isOn = !!enabled;
      axisState[axis] = isOn;

      if (cardEls[axis]) cardEls[axis].classList.toggle("is-off", !isOn);
      if (lineEls[axis]) lineEls[axis].classList.toggle("is-off", !isOn);
      if (cardEls[axis]) cardEls[axis].setAttribute("aria-pressed", String(isOn));
      if (persist) scheduleAxisVisibilitySave();
    }

    function setAxisAvailability(axis, available){
      if (axis === "spindle") return;
      const isAvailable = !!available;
      axisAvailability[axis] = isAvailable;
      if (cardEls[axis]) cardEls[axis].classList.toggle("is-unavailable", !isAvailable);
      if (!isAvailable && axisValueEls[axis]){
        axisValueEls[axis].textContent = "--";
      }
      if (isAvailable && axisValueEls[axis]){
        axisValueEls[axis].textContent = `${clampPercent(axisValues[axis])}%`;
      }
    }

    function applyAxisSensorPayload(sensorPayloads){
      axisKeys.forEach((axis) => {
        if (axis === "spindle") return;
        const payload = sensorPayloads && typeof sensorPayloads === "object" ? sensorPayloads[axis] : null;
        setAxisAvailability(axis, !!(payload && payload.available));
      });
    }

    document.querySelectorAll(".axis-card").forEach((card) => {
      const axis = card.dataset.axis;
      setAxisEnabled(axis, true, false);
      card.addEventListener("pointerdown", (ev) => {
        if (ev.pointerType === "mouse"){
          return;
        }
        axisSuppressClickUntilMs[axis] = performance.now() + 700;
        ev.preventDefault();
        setAxisEnabled(axis, !axisState[axis], true);
      });
      card.addEventListener("click", () => {
        if (performance.now() < (axisSuppressClickUntilMs[axis] || 0)){
          return;
        }
        setAxisEnabled(axis, !axisState[axis], true);
      });
      card.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" || ev.key === " "){
          ev.preventDefault();
          setAxisEnabled(axis, !axisState[axis], true);
        }
      });
    });

    setupGaugePaths(spindleGauge);
    setupGaugePaths(spindleTempGauge);

    const initialValues = { spindle: 68, x: 42, y: 55, z: 33 };
    axisKeys.forEach((key) => setAxisValue(key, initialValues[key]));
    applyAxisSensorPayload({});
    pushHistory(performance.now());
    updateGraphWindow(60, false);
    loadSettings();
    loadSpindleTemperature();
    setInterval(loadSpindleTemperature, SPINDLE_TEMP_REFRESH_MS);
    requestAnimationFrame(tick);

    function applyAxesPayload(payload){
      axisKeys.forEach((key) => {
        if (payload && payload[key] !== undefined){
          setAxisValue(key, payload[key]);
        }
      });
    }

    window.addEventListener("message", (ev) => {
      if (ev.origin !== location.origin) return;
      const msg = ev.data || {};
      if (msg.type === "axes"){
        const payload = (msg.axes && typeof msg.axes === "object") ? msg.axes : msg;
        applyAxesPayload(payload);
        if (msg.axisLoadSensors && typeof msg.axisLoadSensors === "object"){
          applyAxisSensorPayload(msg.axisLoadSensors);
        }
      }
      if (msg.type === "setGraphWindow"){
        updateGraphWindow(msg.seconds, true);
      }
    });

    axesChart.addEventListener("pointerdown", (ev) => {
      if (ev.pointerType === "mouse" && ev.button !== 0) return;
      clearGraphPress();
      graphPressTimer = setTimeout(() => {
        window.parent.postMessage({
          type: "openGraphSettingsModal",
          seconds: Math.round(HISTORY_WINDOW_MS / 1000)
        }, location.origin);
      }, 600);
    });
    axesChart.addEventListener("pointerup", clearGraphPress);
    axesChart.addEventListener("pointerleave", clearGraphPress);
    axesChart.addEventListener("pointercancel", clearGraphPress);
  </script>
</body>
</html>
