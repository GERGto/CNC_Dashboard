<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Systemkonfiguration</title>
  <link rel="stylesheet" href="../assets/ui-common.css" />
  <style>
    :root{
      --line:#000;
      --bg:#fff;
      --fg:#000;
      --muted:#555;
      --muted-soft:#787878;
      --ok:#0f8f3a;
      --off:#b61e1e;
      --bar:#111;
      --bar-bg:#e8e8e8;
      --font:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    }

    html,
    body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      background:var(--bg);
      color:var(--fg);
      font-family:var(--font);
    }

    html,
    body,
    button,
    input,
    select,
    textarea,
    iframe,
    *{
      cursor:none !important;
    }

    .wrap{
      height:100vh;
      box-sizing:border-box;
      padding:12px;
      overflow:hidden;
    }

    .system-grid{
      height:100%;
      display:grid;
      grid-template-columns:minmax(0, 1.22fr) minmax(0, 0.9fr) minmax(0, 1fr);
      gap:12px;
      align-items:stretch;
    }

    .sys-card{
      min-width:0;
      min-height:0;
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:10px;
      padding:13px;
      box-sizing:border-box;
      border:2px solid var(--line);
      border-radius:2px;
      background:#fff;
    }

    .sys-card__header{
      display:grid;
      gap:0;
    }

    .sys-card__title{
      margin:0;
      font-size:23px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:-0.03em;
    }

    .sys-card__body{
      min-height:0;
      display:grid;
      gap:10px;
      align-content:start;
    }

    .sys-card__footer{
      display:grid;
      gap:8px;
      align-content:end;
    }

    .sys-card__hint{
      margin:0;
      font-size:12px;
      line-height:1.35;
      font-weight:700;
      color:var(--muted);
    }

    .sys-card__btn{
      width:100%;
      min-height:48px;
      border:2px solid var(--line);
      border-radius:2px;
      background:#fff;
      color:#000;
      font-size:15px;
      font-weight:800;
      padding:10px 12px;
    }

    .sys-card__btn:active{
      transform:translateY(1px);
    }

    .status-pill{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:0;
      padding:0;
      box-sizing:border-box;
      font-size:14px;
      font-weight:800;
      line-height:1.25;
      background:transparent;
    }

    .cfg__dot{
      width:10px;
      height:10px;
      flex:0 0 10px;
      border-radius:50%;
      border:1px solid #000;
      background:#777;
    }

    .cfg__dot.is-on{
      background:var(--ok);
    }

    .cfg__dot.is-off{
      background:var(--off);
    }

    .sys-meta{
      display:grid;
      gap:12px;
      align-content:start;
    }

    .sys-meta__row{
      display:grid;
      gap:3px;
      padding:0;
      min-width:0;
      box-sizing:border-box;
    }

    .sys-meta__label{
      font-size:11px;
      font-weight:800;
      letter-spacing:0.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .sys-meta__value{
      min-width:0;
      font-size:17px;
      line-height:1.2;
      font-weight:800;
      word-break:break-word;
    }

    .system-clusters{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      align-content:start;
    }

    .system-cluster{
      display:grid;
      gap:8px;
      padding:0;
      box-sizing:border-box;
    }

    .system-cluster--runtime,
    .system-cluster--metrics{
      grid-column:1 / -1;
    }

    .system-cluster__title{
      margin:0;
      font-size:11px;
      font-weight:800;
      letter-spacing:0.16em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .runtime-cluster__layout{
      display:grid;
      grid-template-columns:minmax(0, 1fr) minmax(0, 1.1fr);
      gap:12px;
      align-items:stretch;
    }

    .runtime-hero{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      gap:8px;
      align-content:center;
      padding-right:10px;
      border-right:2px solid var(--line);
      min-width:0;
    }

    .runtime-hero__label{
      font-size:12px;
      font-weight:800;
      letter-spacing:0.1em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .runtime-hero__value{
      font-size:25px;
      line-height:1.1;
      font-weight:900;
      letter-spacing:-0.02em;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      text-align:right;
    }

    .axis-runtime-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:0;
      align-items:center;
    }

    .axis-runtime{
      min-width:0;
      display:grid;
      gap:1px;
    }

    .axis-runtime:not(:first-child){
      padding-left:8px;
      border-left:2px solid var(--line);
    }

    .axis-runtime__label{
      font-size:11px;
      font-weight:800;
      letter-spacing:0.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .axis-runtime__value{
      font-size:17px;
      line-height:1.1;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .metric-stack{
      display:grid;
      gap:8px;
    }

    .metric-line{
      display:grid;
      gap:5px;
    }

    .metric-line__top{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      gap:10px;
      align-items:baseline;
    }

    .metric-line__label{
      min-width:0;
      font-size:11px;
      font-weight:800;
      letter-spacing:0.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .metric-line__value{
      min-width:0;
      font-size:18px;
      line-height:1;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:right;
    }

    .metric-line__value--version{
      font-size:14px;
      font-family:Consolas,"Courier New",monospace;
      letter-spacing:0;
      text-transform:none;
      white-space:normal;
      word-break:break-word;
    }

    .metric-line__bar{
      height:9px;
      border:0;
      border-radius:0;
      background:var(--bar-bg);
      overflow:hidden;
      box-sizing:border-box;
    }

    .metric-line__bar > div{
      height:100%;
      width:0%;
      background:var(--bar);
    }

    .metric-line--plain .metric-line__bar{
      display:none;
    }

    .remote-card__body{
      display:grid;
      grid-template-columns:108px minmax(0, 1fr);
      gap:10px;
      align-items:start;
    }

    .remote-card__qr-shell{
      width:108px;
      height:108px;
      justify-self:start;
      display:grid;
      place-items:center;
      overflow:hidden;
      box-sizing:border-box;
    }

    .remote-card__qr{
      width:104px;
      height:104px;
      display:grid;
      place-items:center;
      line-height:0;
      text-align:center;
    }

    .remote-card__qr svg{
      display:block;
      width:104px;
      height:104px;
    }

    .remote-card__qr.is-placeholder{
      line-height:1.35;
      color:var(--muted-soft);
      font-size:12px;
      font-weight:800;
    }

    .remote-card__copy{
      min-width:0;
      display:grid;
      gap:6px;
      align-content:start;
    }

    .sys-card--system .system-cluster + .system-cluster{
      padding-top:8px;
      border-top:2px solid var(--line);
    }

    @media (max-width: 930px){
      .system-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }

      .remote-card{
        grid-column:1 / -1;
      }

      .system-clusters{
        grid-template-columns:1fr;
      }

      .system-cluster--runtime,
      .system-cluster--metrics{
        grid-column:auto;
      }
    }

    @media (max-width: 720px){
      html,
      body{
        overflow:auto;
      }

      .wrap{
        height:auto;
        min-height:100vh;
      }

      .system-grid{
        height:auto;
        grid-template-columns:1fr;
      }

      .remote-card{
        grid-column:auto;
      }

      .remote-card__body{
        grid-template-columns:1fr;
      }

      .remote-card__qr-shell{
        justify-self:start;
      }

      .runtime-cluster__layout{
        grid-template-columns:1fr;
        gap:8px;
      }

      .runtime-hero{
        padding-right:0;
        padding-bottom:8px;
        border-right:0;
        border-bottom:2px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="system-grid" aria-label="Systemübersicht">
      <article class="sys-card sys-card--system" aria-label="Systemdaten">
        <header class="sys-card__header">
          <h2 class="sys-card__title">Systemdaten</h2>
        </header>

        <div class="sys-card__body">
          <div class="system-clusters">
            <section class="system-cluster system-cluster--runtime" aria-label="Laufzeiten">
              <p class="system-cluster__title">Laufzeiten</p>

              <div class="runtime-cluster__layout">
                <div class="runtime-hero">
                  <span class="runtime-hero__label">Spindel</span>
                  <strong class="runtime-hero__value" id="systemRuntimeSpindleValue">0,0h</strong>
                </div>

                <div class="axis-runtime-grid">
                  <div class="axis-runtime">
                    <span class="axis-runtime__label">X</span>
                    <strong class="axis-runtime__value" id="systemRuntimeXValue">0,0h</strong>
                  </div>
                  <div class="axis-runtime">
                    <span class="axis-runtime__label">Y</span>
                    <strong class="axis-runtime__value" id="systemRuntimeYValue">0,0h</strong>
                  </div>
                  <div class="axis-runtime">
                    <span class="axis-runtime__label">Z</span>
                    <strong class="axis-runtime__value" id="systemRuntimeZValue">0,0h</strong>
                  </div>
                </div>
              </div>
            </section>

            <section class="system-cluster system-cluster--metrics" aria-label="Systemwerte">
              <div class="metric-stack">
                <div class="metric-line">
                  <div class="metric-line__top">
                    <span class="metric-line__label">Gehäuse</span>
                    <strong class="metric-line__value" id="systemEnclosureValue">-</strong>
                  </div>
                  <div class="metric-line__bar"><div id="systemEnclosureBar"></div></div>
                </div>

                <div class="metric-line">
                  <div class="metric-line__top">
                    <span class="metric-line__label">CPU Temp</span>
                    <strong class="metric-line__value" id="systemCpuTempValue">-</strong>
                  </div>
                  <div class="metric-line__bar"><div id="systemCpuTempBar"></div></div>
                </div>

                <div class="metric-line">
                  <div class="metric-line__top">
                    <span class="metric-line__label">CPU Last</span>
                    <strong class="metric-line__value" id="systemCpuLoadValue">-</strong>
                  </div>
                  <div class="metric-line__bar"><div id="systemCpuLoadBar"></div></div>
                </div>
                <div class="metric-line">
                  <div class="metric-line__top">
                    <span class="metric-line__label">RAM</span>
                    <strong class="metric-line__value" id="systemRamValue">-</strong>
                  </div>
                  <div class="metric-line__bar"><div id="systemRamBar"></div></div>
                </div>

                <div class="metric-line">
                  <div class="metric-line__top">
                    <span class="metric-line__label">Speicher</span>
                    <strong class="metric-line__value" id="systemStorageValue">-</strong>
                  </div>
                  <div class="metric-line__bar"><div id="systemStorageBar"></div></div>
                </div>

                <div class="metric-line metric-line--plain">
                  <div class="metric-line__top">
                    <span class="metric-line__label">Softwareversion</span>
                    <strong class="metric-line__value metric-line__value--version" id="systemVersionValue">-</strong>
                  </div>
                  <div class="metric-line__bar"><div></div></div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </article>

      <article class="sys-card sys-card--wifi" aria-label="WLAN">
        <header class="sys-card__header">
          <h2 class="sys-card__title">WLAN</h2>
        </header>

        <div class="sys-card__body">
          <div class="status-pill">
            <span class="cfg__dot" id="wifiStateDot" aria-hidden="true"></span>
            <span id="wifiStateText">Nicht verbunden</span>
          </div>

          <div class="sys-meta">
            <div class="sys-meta__row">
              <span class="sys-meta__label">IP-Adresse</span>
              <strong class="sys-meta__value" id="wifiIpText">-</strong>
            </div>
          </div>
        </div>

        <footer class="sys-card__footer">
          <button class="sys-card__btn" id="openWifiConfigBtn" type="button">WLAN konfigurieren</button>
        </footer>
      </article>

      <article class="sys-card remote-card" id="remoteCard" aria-label="Remote-Dashboard">
        <header class="sys-card__header">
          <h2 class="sys-card__title">Remote-Dashboard</h2>
        </header>

        <div class="sys-card__body remote-card__body">
          <div class="remote-card__qr-shell" aria-hidden="true">
            <div class="remote-card__qr is-placeholder" id="qrContainer">WLAN verbinden</div>
          </div>

          <div class="remote-card__copy">
            <div class="sys-meta">
              <div class="sys-meta__row">
                <span class="sys-meta__label">Adresse</span>
                <strong class="sys-meta__value" id="remoteUrl">Noch nicht verfügbar</strong>
              </div>
            </div>

            <p class="sys-card__hint" id="remoteHint">QR-Code für den Direktzugriff im Heimnetz.</p>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="../assets/vendor/qrcode.min.js"></script>
  <script>
    function createApiBase(){
      const params = new URLSearchParams(window.location.search);
      const fromQuery = params.get("apiBase");
      if (fromQuery){
        try{
          return new URL(fromQuery).origin;
        }catch (_error){
        }
      }

      const base = new URL(window.location.href);
      base.port = params.get("backendPort") || "8080";
      base.pathname = "";
      base.search = "";
      base.hash = "";
      return base.origin;
    }

    const API_BASE = createApiBase();
    const systemRuntimeSpindleValue = document.getElementById("systemRuntimeSpindleValue");
    const systemRuntimeXValue = document.getElementById("systemRuntimeXValue");
    const systemRuntimeYValue = document.getElementById("systemRuntimeYValue");
    const systemRuntimeZValue = document.getElementById("systemRuntimeZValue");
    const systemEnclosureValue = document.getElementById("systemEnclosureValue");
    const systemEnclosureBar = document.getElementById("systemEnclosureBar");
    const systemCpuTempValue = document.getElementById("systemCpuTempValue");
    const systemCpuTempBar = document.getElementById("systemCpuTempBar");
    const systemCpuLoadValue = document.getElementById("systemCpuLoadValue");
    const systemCpuLoadBar = document.getElementById("systemCpuLoadBar");
    const systemRamValue = document.getElementById("systemRamValue");
    const systemRamBar = document.getElementById("systemRamBar");
    const systemStorageValue = document.getElementById("systemStorageValue");
    const systemStorageBar = document.getElementById("systemStorageBar");
    const systemVersionValue = document.getElementById("systemVersionValue");
    const openWifiConfigBtn = document.getElementById("openWifiConfigBtn");
    const wifiStateDot = document.getElementById("wifiStateDot");
    const wifiStateText = document.getElementById("wifiStateText");
    const wifiIpText = document.getElementById("wifiIpText");
    const remoteCard = document.getElementById("remoteCard");
    const qrContainer = document.getElementById("qrContainer");
    const remoteUrlEl = document.getElementById("remoteUrl");
    const remoteHint = document.getElementById("remoteHint");

    let spindleRuntimeSec = 0;
    let axisRuntimeSec = { x: 0, y: 0, z: 0 };
    let wifiConnected = false;
    let wifiSsid = "";
    let wifiIssue = "";
    let wifiIpAddress = "";
    let lastQrIp = "";

    function setBar(el, percent){
      if (!el) return;
      const value = Math.max(0, Math.min(100, Number(percent) || 0));
      el.style.width = `${value}%`;
    }

    function formatHours(seconds){
      const sec = Math.max(0, Math.floor(Number(seconds) || 0));
      return `${(sec / 3600).toFixed(1).replace(".", ",")}h`;
    }

    function formatTemperature(value, available){
      if (!available || !Number.isFinite(Number(value))){
        return "-";
      }
      return `${Number(value).toFixed(1).replace(".", ",")} °C`;
    }

    function formatPercent(value, available){
      if (!available || !Number.isFinite(Number(value))){
        return "-";
      }
      return `${Math.round(Number(value))} %`;
    }

    function normalizeAxisRuntimeSnapshot(raw){
      const source = raw && typeof raw === "object" ? raw : {};
      return {
        x: Math.max(0, Math.floor(Number(source.x) || 0)),
        y: Math.max(0, Math.floor(Number(source.y) || 0)),
        z: Math.max(0, Math.floor(Number(source.z) || 0)),
      };
    }

    function renderRuntimeValues(){
      systemRuntimeSpindleValue.textContent = formatHours(spindleRuntimeSec);
      systemRuntimeXValue.textContent = formatHours(axisRuntimeSec.x);
      systemRuntimeYValue.textContent = formatHours(axisRuntimeSec.y);
      systemRuntimeZValue.textContent = formatHours(axisRuntimeSec.z);
    }

    function applySystemStatus(snapshot){
      const data = snapshot && typeof snapshot === "object" ? snapshot : {};
      spindleRuntimeSec = Math.max(0, Math.floor(Number(data.spindleRuntimeSec) || 0));
      axisRuntimeSec = normalizeAxisRuntimeSnapshot(data.axisRuntimeSec);
      renderRuntimeValues();

      systemEnclosureValue.textContent = formatTemperature(
        data.enclosureTemperatureC,
        !!data.enclosureTemperatureAvailable
      );
      systemCpuTempValue.textContent = formatTemperature(
        data.cpuTemperatureC,
        !!data.cpuTemperatureAvailable
      );
      systemCpuLoadValue.textContent = formatPercent(
        data.cpuUsagePercent,
        !!data.cpuUsageAvailable
      );
      systemRamValue.textContent = formatPercent(data.ramUsedPercent, !!data.ramAvailable);
      systemStorageValue.textContent = formatPercent(data.storageUsedPercent, !!data.storageAvailable);
      systemVersionValue.textContent = String(data.softwareVersion || "-").trim() || "-";

      const bars = data.bars && typeof data.bars === "object" ? data.bars : {};
      setBar(systemEnclosureBar, bars.enclosureTemperaturePercent);
      setBar(systemCpuTempBar, bars.cpuTemperaturePercent);
      setBar(systemCpuLoadBar, bars.cpuUsagePercent);
      setBar(systemRamBar, bars.ramUsedPercent);
      setBar(systemStorageBar, bars.storageUsedPercent);
    }

    function setRemotePlaceholder(qrText, hintText, urlText){
      lastQrIp = "";
      remoteCard.classList.remove("is-ready");
      qrContainer.classList.add("is-placeholder");
      qrContainer.textContent = qrText;
      remoteHint.textContent = hintText;
      remoteUrlEl.textContent = urlText;
    }

    function renderQrCode(ip){
      if (!ip){
        setRemotePlaceholder("IP wird ermittelt", "Die Netzwerkadresse wird noch aufgebaut.", "Wird ermittelt…");
        return;
      }

      const url = `http://${ip}`;
      remoteCard.classList.add("is-ready");
      remoteHint.textContent = "QR-Code für den Direktzugriff im Heimnetz.";
      remoteUrlEl.textContent = url;

      if (ip === lastQrIp){
        return;
      }

      lastQrIp = ip;
      const qr = qrcode(0, "L");
      qr.addData(url, "Byte");
      qr.make();
      qrContainer.classList.remove("is-placeholder");
      qrContainer.innerHTML = qr.createSvgTag({ cellSize: 4, margin: 0, scalable: true });
    }

    function openWifiConfigModal(){
      window.parent.postMessage({ type: "openWifiConfigModal" }, location.origin);
    }

    function setWifiStatus(connected, ssid = "", issue = "", ipAddress = ""){
      wifiConnected = !!connected;
      if (typeof ssid === "string") wifiSsid = ssid.trim();
      if (typeof issue === "string") wifiIssue = issue.trim();
      if (typeof ipAddress === "string") wifiIpAddress = ipAddress.trim();

      wifiStateDot.classList.toggle("is-on", wifiConnected);
      wifiStateDot.classList.toggle("is-off", !wifiConnected);

      if (wifiConnected){
        wifiStateText.textContent = wifiSsid ? `Verbunden mit ${wifiSsid}` : "Verbunden";
        wifiIpText.textContent = wifiIpAddress ? wifiIpAddress : "Wird ermittelt…";
        renderQrCode(wifiIpAddress);
      } else {
        wifiStateText.textContent = wifiIssue ? wifiIssue : "Nicht verbunden";
        wifiIpText.textContent = "-";
        setRemotePlaceholder(
          "WLAN verbinden",
          "QR-Code für den Direktzugriff im Heimnetz.",
          "Noch nicht verfügbar"
        );
      }
    }

    function toBool(value){
      if (typeof value === "boolean") return value;
      if (typeof value === "number" && (value === 0 || value === 1)) return Boolean(value);
      return null;
    }

    async function fetchJson(path){
      const response = await fetch(`${API_BASE}${path}`, { cache: "no-store" });
      if (!response.ok){
        throw new Error(`HTTP ${response.status}`);
      }
      return response.json();
    }

    async function loadSystemPageData(){
      try{
        const [systemStatus, wifiStatus] = await Promise.all([
          fetchJson("/api/system/status"),
          fetchJson("/api/wifi/status"),
        ]);

        applySystemStatus(systemStatus);

        const connected = toBool(wifiStatus?.wifiConnected);
        const ssid = typeof wifiStatus?.wifiSsid === "string" ? wifiStatus.wifiSsid : "";
        const issue = typeof wifiStatus?.wifiIssue === "string" ? wifiStatus.wifiIssue : "";
        const ipAddress = typeof wifiStatus?.wifiIpAddress === "string" ? wifiStatus.wifiIpAddress : "";
        setWifiStatus(connected === null ? false : connected, ssid, issue, ipAddress);
      }catch (_error){
      }
    }

    window.addEventListener("message", (ev) => {
      if (ev.origin !== location.origin) return;
      const msg = ev.data || {};
      if (typeof msg !== "object") return;

      if (msg.type === "init" && typeof msg.spindleRuntimeSec === "number"){
        spindleRuntimeSec = Math.max(0, Math.floor(Number(msg.spindleRuntimeSec) || 0));
        renderRuntimeValues();
      }
      if (msg.type === "spindleRuntime" && typeof msg.seconds === "number"){
        spindleRuntimeSec = Math.max(0, Math.floor(Number(msg.seconds) || 0));
        renderRuntimeValues();
      }
      if (msg.type === "init"){
        const connected = toBool(msg.wifiConnected);
        const ssid = typeof msg.wifiSsid === "string" ? msg.wifiSsid : wifiSsid;
        const issue = typeof msg.wifiIssue === "string" ? msg.wifiIssue : wifiIssue;
        const ipAddress = typeof msg.wifiIpAddress === "string" ? msg.wifiIpAddress : wifiIpAddress;
        if (connected !== null){
          setWifiStatus(connected, ssid, issue, ipAddress);
        }
      }
      if (msg.type === "wifi"){
        const connected = toBool(msg.connected);
        const ssid = typeof msg.ssid === "string" ? msg.ssid : wifiSsid;
        const issue = typeof msg.issue === "string" ? msg.issue : wifiIssue;
        const ipAddress = typeof msg.wifiIpAddress === "string" ? msg.wifiIpAddress : wifiIpAddress;
        if (connected !== null){
          setWifiStatus(connected, ssid, issue, ipAddress);
        }
      }
      if (msg.type === "openWifiConfig" && msg.openModal !== false){
        openWifiConfigModal();
      }
      if (msg.type === "pageShown"){
        loadSystemPageData();
      }
    });

    openWifiConfigBtn.addEventListener("click", openWifiConfigModal);

    applySystemStatus({});
    setWifiStatus(wifiConnected);
    loadSystemPageData();
    window.setInterval(loadSystemPageData, 5000);
  </script>
</body>
</html>
