<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Systemkonfiguration</title>
  <link rel="stylesheet" href="../assets/ui-common.css" />
  <style>
    :root{
      --line:#000;
      --bg:#fff;
      --fg:#000;
      --muted:#555;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--fg);
      font-family:var(--font);
    }

    html,
    body,
    button,
    input,
    select,
    textarea,
    iframe,
    *{
      cursor:none !important;
    }

    .wrap{
      padding:16px;
      box-sizing:border-box;
    }

    .seg{
      display:inline-flex;
      border:2px solid var(--line);
      border-radius:2px;
      overflow:hidden;
      margin:0 0 14px 0;
      background:#fff;
    }

    .seg__btn{
      border:0;
      border-left:2px solid var(--line);
      background:#fff;
      color:#000;
      font-size:15px;
      font-weight:700;
      padding:10px 12px;
      min-width:160px;
      cursor:pointer;
    }

    .seg__btn:first-child{
      border-left:0;
    }

    .seg__btn.is-active{
      background:#000;
      color:#fff;
    }

    .panel{
      display:none;
    }

    .panel.is-active{
      display:block;
    }

    .tile{
      border:2px solid var(--line);
      border-radius:2px;
      padding:10px 12px;
      box-sizing:border-box;
      width:220px;
    }

    .tile__label{
      margin:0;
      font-size:14px;
      font-weight:700;
      letter-spacing:0.2px;
    }

    .tile__value{
      margin-top:6px;
      font-size:34px;
      font-weight:700;
      letter-spacing:0.8px;
      line-height:1;
    }

    .cfg-list{
      display:grid;
      gap:10px;
      max-width:560px;
    }

    .cfg-card{
      border:2px solid var(--line);
      border-radius:2px;
      padding:12px;
      display:grid;
      gap:8px;
      background:#fff;
    }

    .cfg-card__head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:18px;
      font-weight:800;
    }

    .cfg-card__text{
      font-size:15px;
      color:var(--muted);
      font-weight:600;
    }

    .cfg-card__btn{
      border:2px solid var(--line);
      border-radius:2px;
      background:#fff;
      color:#000;
      font-size:15px;
      font-weight:700;
      padding:8px 12px;
      justify-self:start;
    }

    .cfg-card__btn:active{
      transform: translateY(1px);
    }

    .cfg-note{
      border:2px dashed var(--line);
      border-radius:2px;
      padding:10px 12px;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }

    .cfg__status{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:15px;
      font-weight:700;
    }

    .cfg__dot{
      width:10px;
      height:10px;
      border-radius:50%;
      border:1px solid #000;
      background:#777;
    }

    .cfg__dot.is-on{
      background:#0f8f3a;
    }

    .cfg__dot.is-off{
      background:#b61e1e;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="seg" role="tablist" aria-label="Systembereiche">
      <button class="seg__btn is-active" id="tabOverview" type="button" role="tab" aria-selected="true" aria-controls="panelOverview">Systemübersicht</button>
      <button class="seg__btn" id="tabConfig" type="button" role="tab" aria-selected="false" aria-controls="panelConfig">Systemkonfiguration</button>
    </div>

    <section class="panel is-active" id="panelOverview" role="tabpanel" aria-labelledby="tabOverview">
      <div class="tile" aria-label="Spindellaufzeit">
        <p class="tile__label">Spindellaufzeit</p>
        <div class="tile__value" id="runtimeCompact">0,0 Stunden</div>
      </div>
    </section>

    <section class="panel" id="panelConfig" role="tabpanel" aria-labelledby="tabConfig">
      <div class="cfg-list">
        <div class="cfg-card">
          <div class="cfg-card__head">
            <span>WLAN</span>
            <div class="cfg__status">
              <span class="cfg__dot" id="wifiStateDot" aria-hidden="true"></span>
              <span id="wifiStateText">Status: Unbekannt</span>
            </div>
          </div>
          <div class="cfg-card__text">Netzwerk auswählen, Zugangsdaten speichern und Verbindung steuern.</div>
          <button class="cfg-card__btn" id="openWifiConfigBtn" type="button">WLAN konfigurieren</button>
        </div>

        <div class="cfg-note">Platzhalter für weitere Systemkonfigurationen.</div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "http://localhost:8080";
    const runtimeCompactEl = document.getElementById("runtimeCompact");
    const tabOverview = document.getElementById("tabOverview");
    const tabConfig = document.getElementById("tabConfig");
    const panelOverview = document.getElementById("panelOverview");
    const panelConfig = document.getElementById("panelConfig");
    const openWifiConfigBtn = document.getElementById("openWifiConfigBtn");
    const wifiStateDot = document.getElementById("wifiStateDot");
    const wifiStateText = document.getElementById("wifiStateText");

    let spindleRuntimeSec = 0;
    let wifiConnected = false;
    let wifiSsid = "";
    let wifiIssue = "";

    function setActiveTab(name){
      const overview = name === "overview";
      tabOverview.classList.toggle("is-active", overview);
      tabConfig.classList.toggle("is-active", !overview);
      tabOverview.setAttribute("aria-selected", String(overview));
      tabConfig.setAttribute("aria-selected", String(!overview));
      panelOverview.classList.toggle("is-active", overview);
      panelConfig.classList.toggle("is-active", !overview);
    }

    function renderSpindleRuntime(seconds){
      const sec = Math.max(0, Math.floor(Number(seconds) || 0));
      spindleRuntimeSec = sec;
      const hours = (sec / 3600).toFixed(1).replace(".", ",");
      runtimeCompactEl.textContent = `${hours} Stunden`;
    }

    function openWifiConfigModal(){
      window.parent.postMessage({ type: "openWifiConfigModal" }, location.origin);
    }

    function setWifiStatus(connected, ssid = "", issue = ""){
      wifiConnected = !!connected;
      if (typeof ssid === "string"){
        wifiSsid = ssid.trim();
      }
      if (typeof issue === "string"){
        wifiIssue = issue.trim();
      }
      wifiStateDot.classList.toggle("is-on", wifiConnected);
      wifiStateDot.classList.toggle("is-off", !wifiConnected);
      const networkName = wifiSsid;
      if (wifiConnected){
        wifiStateText.textContent = networkName ? `Status: Verbunden mit ${networkName}` : "Status: Verbunden";
      } else {
        wifiStateText.textContent = wifiIssue ? `Status: ${wifiIssue}` : "Status: Nicht verbunden";
      }
    }

    function toBool(value){
      if (typeof value === "boolean"){
        return value;
      }
      if (typeof value === "number" && (value === 0 || value === 1)){
        return Boolean(value);
      }
      return null;
    }

    function loadSystemSettings(){
      fetch(`${API_BASE}/api/settings`)
        .then((res) => res.ok ? res.json() : null)
        .then((data) => {
          if (!data || typeof data !== "object") return;
          if (typeof data.spindleRuntimeSec === "number"){
            renderSpindleRuntime(data.spindleRuntimeSec);
          }
          const currentSsid = typeof data.wifiSsid === "string" ? data.wifiSsid : "";
          const connected = toBool(data.wifiConnected);
          const issue = typeof data.wifiIssue === "string" ? data.wifiIssue : "";
          setWifiStatus(connected === null ? false : connected, currentSsid, issue);
        });
    }

    window.addEventListener("message", (ev) => {
      if (ev.origin !== location.origin) return;
      const msg = ev.data || {};
      if (typeof msg !== "object") return;

      if (msg.type === "init" && typeof msg.spindleRuntimeSec === "number"){
        renderSpindleRuntime(msg.spindleRuntimeSec);
      }
      if (msg.type === "spindleRuntime" && typeof msg.seconds === "number"){
        renderSpindleRuntime(msg.seconds);
      }
      if (msg.type === "init"){
        const connected = toBool(msg.wifiConnected);
        const ssid = typeof msg.wifiSsid === "string" ? msg.wifiSsid : wifiSsid;
        const issue = typeof msg.wifiIssue === "string" ? msg.wifiIssue : wifiIssue;
        if (connected !== null){
          setWifiStatus(connected, ssid, issue);
        }
      }
      if (msg.type === "wifi"){
        const connected = toBool(msg.connected);
        const ssid = typeof msg.ssid === "string" ? msg.ssid : wifiSsid;
        const issue = typeof msg.issue === "string" ? msg.issue : wifiIssue;
        if (connected !== null){
          setWifiStatus(connected, ssid, issue);
        }
      }
      if (msg.type === "openWifiConfig"){
        setActiveTab("config");
        if (msg.openModal !== false){
          openWifiConfigModal();
        }
      }
    });

    tabOverview.addEventListener("click", () => setActiveTab("overview"));
    tabConfig.addEventListener("click", () => setActiveTab("config"));
    openWifiConfigBtn.addEventListener("click", () => {
      setActiveTab("config");
      openWifiConfigModal();
    });

    renderSpindleRuntime(spindleRuntimeSec);
    setWifiStatus(wifiConnected);
    loadSystemSettings();
  </script>
</body>
</html>
